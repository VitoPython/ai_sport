# Compose для деплою на Dokploy.
# Сервіс у мережі dokploy-network; домен і TLS додаються через Dokploy → вкладка Domains
# (Service Name: api, Container Port: 8000) — мітки Traefik проставить сам Dokploy.
# Змінні (ANTHROPIC_API_KEY, MONGO_URL тощо) задаються в Dokploy → Environment.

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-sport-api:latest
    restart: unless-stopped
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      # MONGO_URL — Internal Connection URL Mongo-сервісу з Dokploy.
      MONGO_URL: ${MONGO_URL}
      MONGO_DB: ${MONGO_DB:-ai_sport}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
