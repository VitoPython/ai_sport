# Compose для локального запуску (без Traefik/Dokploy).
# Піднімає API + локальний MongoDB. Читає змінні з backend/.env для ${...}.
#
#   docker compose -f docker-compose.local.yml up --build
#
# Swagger: http://127.0.0.1:8000/docs

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-sport-api:local
    restart: unless-stopped
    # Compose автоматично читає backend/.env для підстановки ${...} нижче.
    environment:
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      CLAUDE_MODEL: ${CLAUDE_MODEL:-claude-opus-4-8}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      MONGO_URL: mongodb://mongo:27017
      MONGO_DB: ${MONGO_DB:-ai_sport}
    depends_on:
      - mongo
    ports:
      - "8000:8000"

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    ports:
      - "27017:27017"   # для доступу з хоста (Compass тощо); прибери, якщо не потрібно

volumes:
  mongo_data:
